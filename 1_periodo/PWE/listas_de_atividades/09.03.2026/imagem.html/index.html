    <h1>Trabalhando com imagens</h1>

    <p>Se Flower Boy foi a abertura de Tyler para o mundo... CHROMAKOPIA é o álbum da maturidade forçada.</p>
    <img src="chromakopia.png" width="450" height="450" alt="Capa do álbum CHROMAKOPIA em tons de verde e preto">
