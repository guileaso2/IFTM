<!--Formulários em HTML - <form> -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro formulário em HTML</title>
</head>
<body>
    <form >
        
        <fieldset style="width: 300px;">
            <legend>Nome:</legend>
                <input type="text" id="nome" name="nome" required><br>
        </fieldset>
        
        <fieldset style="width:300px">
            <legend>Sexo:</legend>
                <input type="radio" id="masc" name="sexo" value="masculino">
                <label for="masc">Masculino</label>
                <input type="radio" id="fem" name="sexo" value="feminino">
                <label for="fem">Feminino</label><br>
        </fieldset>

        <fieldset style="width: 300px;">
            <legend>Estado Civil:</legend>
                <select name="estadocivil" id="estadocivil" required>
                <option value="casado">Casado(a)</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="viuvo">Viúvo(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="outro">Outro</option>
                </select><br>
        </fieldset>

        <fieldset style="width: 300px;">
            <legend>Número:</legend>
                <input type="number" id="numero" name="numero" required><br>
        </fieldset>
        
        <fieldset style="width: 300px;">
            <legend>Email:</legend>
                <input type="email" id="email" name="email" required><br>
        </fieldset>

        <fieldset style="width: 300px;">
            <legend>Endereço:</legend>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro" required><br>
        </fieldset>

        <fieldset style="width: 300px;">
            <legend>Data de nascimento:</legend>
                <input type="date" id="data" name="data" required><br>
        </fieldset>

        <fieldset style="width: 300px;">
            <legend>Telefone:</legend>
            <input type="tel" id="telefone" name="telefone" required>
        </fieldset>
        
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

        </form>
</body>
</html>
